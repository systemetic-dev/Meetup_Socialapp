<!DOCTYPE html>
<html>
<head>
    <title>Hello Page</title>
</head>
<body>
    <h1>Hello {{ name }} 👋</h1>
    <p>Your age is {{ age }}</p>

    {% if is_logged_in %}
    <p>Welcome back, {{ name }} 😊</p>
{% else %}
    <p>Please login</p>
{% endif %}

<h3>Fruits List:</h3>
<ul>
    {% for fruit in fruits %}
        <li>{{ fruit }}</li>
    {% endfor %}
</ul>
</body>
</html>
